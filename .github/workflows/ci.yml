name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend — lint, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        # `next build` type-checks as part of compilation.
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: placeholder-anon-key

  backend:
    name: Backend — pytest (incl. two-tenant isolation gate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install
        run: pip install -e ".[dev]"

      - name: Test
        # tests/conftest.py isolates settings per-test (chdir to a temp cwd,
        # no real .env.local) — no live Supabase/Mistral credentials needed.
        # This includes test_isolation.py, the two-tenant isolation regression
        # test that docs/superpowers/specs/2026-07-13-klovered-free-python-backend-design.md
        # requires to pass before any request-surface cutover.
        run: pytest -v
