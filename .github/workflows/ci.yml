name: CI

# NOTE: this repo's default branch is `master`, not `main` — verify with
# `git remote show origin` before "fixing" this if it looks wrong later.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend — lint, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        # `next build` type-checks as part of compilation.
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: placeholder-anon-key

  backend:
    name: Backend — pytest (incl. two-tenant isolation gate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install
        run: pip install -e ".[dev]"

      - name: Test
        # tests/conftest.py isolates settings per-test (chdir to a temp cwd,
        # no real .env.local) — no live Supabase/Mistral credentials needed.
        # This includes test_isolation.py, the two-tenant isolation regression
        # test that docs/superpowers/specs/2026-07-13-klovered-free-python-backend-design.md
        # requires to pass before any request-surface cutover.
        run: pytest -v

  deploy:
    name: Deploy frontend to Vercel
    # Frontend only — the Python backend (backend/) has no hosting target
    # decided yet, so there's nothing to deploy it to. This job ships the
    # Next.js app; PY_API_URL must point at wherever the backend ends up
    # running for the deployed frontend's /api/pipeline/* proxy to work.
    needs: [frontend, backend]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push' && vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Deploy (Vercel)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm i -g vercel@latest
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
