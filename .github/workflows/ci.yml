name: CI

# Default branch is `master` (not `main`) — verified with `git remote show origin`.
#
# This workflow is the verification gate only — lint + typecheck-via-build.
# Deployment is NOT handled here and is NOT on Vercel (that was the pre-DO
# setup). The app runs on the DigitalOcean Droplet as the `tool` service in
# Klovered-python/docker-compose.stack.yml, served at klovered.com/app behind
# Caddy. To deploy, the Droplet's ~/klovered-free clone is pulled and the
# `tool` service rebuilt (no auto-deploy workflow exists yet).
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        # `next build` type-checks as part of compilation. Placeholder Supabase
        # vars satisfy the lazy config guards; no real secrets needed to compile
        # (the app reads live values from Vercel env at runtime).
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: placeholder-anon-key
