name: CI

# Default branch is `master` (not `main`) — verified with `git remote show origin`.
#
# CD is handled by Vercel's native GitHub integration (the Vercel GitHub App),
# NOT by this workflow: every push to `master` triggers a Vercel production
# deploy, and every PR gets a preview deploy, automatically. This workflow is
# purely the verification gate — lint + typecheck-via-build — so a red build is
# caught here in parallel with Vercel's own build. There is no `vercel deploy`
# step and no VERCEL_* secrets to manage.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        # `next build` type-checks as part of compilation. Placeholder Supabase
        # vars satisfy the lazy config guards; no real secrets needed to compile
        # (the app reads live values from Vercel env at runtime).
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: placeholder-anon-key
